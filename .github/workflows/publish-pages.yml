name: Build Jekyll site
on:
  workflow_dispatch
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: .

      - name: Download latest releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh --version
          gh release --help
          gh repo list --limit 9999 --no-archived --source --topic package \
              --json name "$GITHUB_REPOSITORY_OWNER" > package-repos.json
          cat package-repos.json | jq -r '.[] | .name' > package-repos.txt
          while IFS= read -r repo; do
             gh release download --repo "$GITHUB_REPOSITORY_OWNER/$repo"
          done < package-repos.txt
          ls -l
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build
        uses: actions/jekyll-build-pages@v1
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
